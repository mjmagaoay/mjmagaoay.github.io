<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Product Pricing Calculator</title>
    <link rel="stylesheet" href="styles.css">
    <link rel="manifest" href="manifest.json">
</head>
<body>
    <div id="loginScreen" class="login-screen">
        <div class="login-card">
            <h1>Product Pricing Calculator</h1>
            <p>Sign in to continue</p>
            <button id="googleSignIn" class="btn btn-google">
                <svg viewBox="0 0 24 24" width="20" height="20"><path fill="#4285F4" d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z"/><path fill="#34A853" d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z"/><path fill="#FBBC05" d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z"/><path fill="#EA4335" d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z"/></svg>
                Sign in with Google
            </button>
        </div>
    </div>

    <div id="appContainer" class="container" style="display:none;">
        <header>
            <div class="header-row">
                <h1>Product Pricing Calculator</h1>
                <div class="user-info">
                    <span id="userName"></span>
                    <button id="signOutBtn" class="btn btn-secondary btn-sm">Sign Out</button>
                </div>
            </div>
        </header>

        <main>
            <section class="saved-products">
                <div class="saved-products-header">
                    <button id="openModal" class="btn btn-primary">+ New Product</button>
                </div>
                <h2>Product List</h2>
                <div id="productList" class="product-list"></div>
            </section>
        </main>
    </div> <!-- end appContainer -->

    <div id="productModal" class="modal-overlay">
        <div class="modal">
            <div class="modal-header">
                <h2 id="modalTitle">New Product</h2>
            </div>
            <div class="modal-body">
                <div class="form-group">
                    <label for="productName">Product</label>
                    <input type="text" id="productName" placeholder="Enter product name" required>
                </div>
                <div class="form-group">
                    <label for="targetMarkup">Target Markup (%)</label>
                    <input type="number" id="targetMarkup" placeholder="10" min="0" step="0.1" value="10">
                </div>

                <h3>Line Items Breakdown:</h3>
                <table class="line-items-table">
                    <thead>
                        <tr>
                            <th>Item</th>
                            <th>Price/Qty</th>
                            <th>Qty</th>
                            <th>Total</th>
                            <th></th>
                        </tr>
                    </thead>
                    <tbody id="lineItemsBody">
                    </tbody>
                </table>
                <button id="addLineItem" class="btn btn-secondary">+ Add Item</button>

                <div class="pricing-summary">
                    <div class="summary-row">
                        <span>Base Cost:</span>
                        <span id="baseCost">₱0.00</span>
                    </div>
                    <div class="summary-row">
                        <span>Markup (<span id="markupPercent">10</span>%):</span>
                        <span id="markupAmount">₱0.00</span>
                    </div>
                    <div class="summary-row total">
                        <span>Calculated Price:</span>
                        <span id="finalPrice">₱0.00</span>
                    </div>
                </div>

                <div class="form-actions">
                    <button id="addNewItem" class="btn btn-secondary">Save & New</button>
                    <button id="saveChanges" class="btn btn-primary">Save & Close</button>
                    <button id="closeDialog" class="btn btn-close">Cancel</button>
                </div>
            </div>
        </div>
    </div>

    <script type="module" src="db.js"></script>
    <script type="module" src="app.js"></script>
</body>
</html>
